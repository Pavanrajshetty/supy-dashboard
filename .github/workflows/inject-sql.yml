name: Inject SQL Into Leads Master

on:
  push:
    branches:
      - main
    paths:
      - 'data/Hubspot/SQL/**'
      - 'scripts/inject_sql.py'
      - '.github/workflows/inject-sql.yml'
  workflow_dispatch:

jobs:
  inject-sql:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run SQL Injector
        env:
          FULL_REBUILD: "false"
        run: python scripts/inject_sql.py

      - name: Commit processed files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/processed/leads_master/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "inject sql into leads master"
            git pull --rebase origin main
            git push origin main
          fi
