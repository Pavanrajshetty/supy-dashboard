name: Build HubSpot Master

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/Hubspot/**'
      - 'scripts/build_hubspot_master.py'
      - '.github/workflows/build-hubspot-master.yml'

permissions:
  contents: write

jobs:
  build-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run merge script
        run: python scripts/build_hubspot_master.py

      - name: Commit updated master file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/master.json
          git diff --staged --quiet || git commit -m "Update HubSpot master file"

      - name: Push changes
        run: git push
