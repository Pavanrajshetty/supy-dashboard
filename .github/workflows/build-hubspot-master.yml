name: Build Leads Master

on:
  push:
    branches:
      - main
    paths:
      - 'data/Hubspot/**'
      - 'data/meta/leads/**'
      - 'scripts/build_hubspot_master.py'
      - '.github/workflows/build-leads-master.yml'
  workflow_dispatch:

jobs:
  build-leads-master:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Leads Master Builder
        env:
          FULL_REBUILD: "false"
        run: python scripts/build_hubspot_master.py

      - name: Commit processed files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/processed/leads_master/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update leads master"
            git push
          fi
