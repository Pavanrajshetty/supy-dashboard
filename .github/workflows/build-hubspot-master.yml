name: Build HubSpot Master

on:
  schedule:
    - cron: '30 4 * * *'  # 10 AM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run script
        run: |
          python scripts/build_hubspot_master.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/processed/
          git commit -m "Update master table" || echo "No changes"
          git push
